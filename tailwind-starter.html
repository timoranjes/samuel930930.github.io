<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind CSS Starter</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['Geist Mono', 'ui-monospace', 'monospace'],
          },
          colors: {
            primary: '#0a72ef',
            'primary-hover': '#0860c7',
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans">
  <!-- Your content here -->
  <div class="max-w-4xl mx-auto px-6 py-12">
    <h1 class="text-4xl font-bold mb-4">Tailwind CSS Starter</h1>
    <p class="text-gray-600 dark:text-gray-400 mb-8">
      This is a starter template with Tailwind CSS CDN configured for the Samuel Lau website project.
    </p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold mb-2">Card Title</h2>
        <p class="text-gray-600 dark:text-gray-400 text-sm">
          Card content goes here. This demonstrates the Tailwind CSS styling.
        </p>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold mb-2">Card Title</h2>
        <p class="text-gray-600 dark:text-gray-400 text-sm">
          Card content goes here. This demonstrates the Tailwind CSS styling.
        </p>
      </div>
    </div>
    <div class="mt-8 flex gap-4">
      <button class="bg-primary hover:bg-primary-hover text-white px-6 py-2 rounded-md font-medium transition-colors">
        Primary Button
      </button>
      <button class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 px-6 py-2 rounded-md font-medium transition-colors">
        Secondary Button
      </button>
    </div>
  </div>
</body>
</html>
